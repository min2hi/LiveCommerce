version: "3.8"

services:
  # ── INFRASTRUCTURE ────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: livecommerce_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-livecommerce}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-livecommerce} -d ${POSTGRES_DB:-livecommerce}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livecommerce_net

  redis:
    image: redis:7-alpine
    container_name: livecommerce_redis_prod
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livecommerce_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: livecommerce_rabbitmq_prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-livecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - livecommerce_net

  # ── BACKEND SERVICES ──────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: livecommerce_api_server_prod
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-livecommerce}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-livecommerce}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-livecommerce}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-xxx}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      - RATE_LIMIT_CHAT_MAX=5
      - RATE_LIMIT_CHECKOUT_MAX=1
      - RATE_LIMIT_WINDOW_MS=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - livecommerce_net

  order-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: livecommerce_order_worker_prod
    command: ["npm", "run", "start:worker", "--workspace=backend"]
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-livecommerce}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-livecommerce}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-livecommerce}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - livecommerce_net

  # ── FRONTEND SERVICES ─────────────────────────────────────────────────────
  buyer-app:
    build:
      context: .
      dockerfile: frontend/buyer-app/Dockerfile.prod
    container_name: livecommerce_buyer_app_prod
    environment:
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - livecommerce_net

  streamer-dashboard:
    build:
      context: .
      dockerfile: frontend/streamer-dashboard/Dockerfile.prod
    container_name: livecommerce_streamer_dashboard_prod
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - livecommerce_net

  admin-panel:
    build:
      context: .
      dockerfile: frontend/admin-panel/Dockerfile.prod
    container_name: livecommerce_admin_panel_prod
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - livecommerce_net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: livecommerce_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - livecommerce_net

  # ── NGINX GATEWAY ─────────────────────────────────────────────────────────
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: livecommerce_nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - buyer-app
      - streamer-dashboard
      - admin-panel
    restart: unless-stopped
    networks:
      - livecommerce_net

networks:
  livecommerce_net:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
