
services:
  # ──────────────────────────────────────────
  # PostgreSQL + pgvector (Vector DB for AI)
  # ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: livecommerce_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-livecommerce}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livecommerce} -d ${POSTGRES_DB:-livecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livecommerce_net

  # ──────────────────────────────────────────
  # Redis (Rate Limiting, Idempotency, Lua, Chat History)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: livecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livecommerce_net

  # ──────────────────────────────────────────
  # RabbitMQ (Order Queue + Dead Letter Queue)
  # Management UI: http://localhost:15672
  # ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: livecommerce_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-livecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      # Pre-configure exchanges and queues via definitions file
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - livecommerce_net

networks:
  livecommerce_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
