# Dependabot — Automated Dependency Updates
# Creates PRs automatically when packages have security updates or new versions
# PRs go through CI pipeline before merging

version: 2

updates:
  # ── npm dependencies ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    # Limit open PRs to avoid noise
    open-pull-requests-limit: 10
    # Group all NPM updates into a single PR (Toàn diện, không bị rác)
    groups:
      all-dependencies:
        patterns:
          - "*"

  # ── GitHub Actions dependencies ───────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci/cd"
      - "automated"
