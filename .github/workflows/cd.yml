# ──────────────────────────────────────────────────────────────────────────
# CD Pipeline — Deploy to Production VPS via SSH
# Triggers: push to main (after CI passes)
# Strategy: Build → Push Docker image → SSH deploy → Health check → Rollback
# ──────────────────────────────────────────────────────────────────────────
name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel a running deployment

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production # Requires manual approval (set in GitHub Settings)
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Build & Push Docker Image to GHCR ──────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api-server
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract Docker metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/order-worker
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push API Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha

      - name: Build and push Order Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha

      # ── Step 2: SSH Deploy to VPS ───────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e  # Exit on any error

            echo "=== Starting deployment ==="
            cd /opt/livecommerce

            # Pull latest image
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull api-server order-worker

            # Rolling update: no downtime
            docker compose up -d --no-deps --scale api-server=2 api-server
            sleep 10

            # Health check
            HEALTH=$(curl -sf http://localhost:3000/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "fail")

            if [ "$HEALTH" != "ok" ]; then
              echo "HEALTH CHECK FAILED — Rolling back..."
              docker compose rollback api-server || docker compose up -d api-server
              exit 1
            fi

            # Scale back to 1 (or desired count)
            docker compose up -d --no-deps api-server order-worker
            docker image prune -f

            echo "=== Deployment successful ==="

      # ── Step 3: Notify on success/failure ──────────────────────────────
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment succeeded — SHA: ${{ github.sha }}"
          # TODO: Add Discord/Slack webhook notification here

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED — SHA: ${{ github.sha }}"
          # TODO: Add Discord/Slack webhook notification here
