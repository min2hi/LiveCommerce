name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Lint Workspace
        run: npm run lint

      - name: Type Check Workspace
        run: npm run type-check

      - name: Run Unit Tests
        run: npm run test

      - name: Start Docker Services
        run: |
          docker compose up -d
          # Wait for services to be healthy
          docker compose ps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Seed Database & Cache
        run: |
          # Wait a few seconds for postgres/redis to boot up
          sleep 10
          npx --workspace=backend ts-node seed-test-data.ts

      - name: Build and Start Applications in Background
        run: |
          # Build services
          npm run build
          # Start dev runner
          npm run dev &
          # Wait for ports to be active
          sleep 15

      - name: Run Playwright E2E Tests
        run: npx playwright test --project=buyer-app-chromium
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
