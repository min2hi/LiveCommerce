# ──────────────────────────────────────────────────────────────────────────
# CI Pipeline — Runs on every PR and push to main/develop
# Jobs: type-check → lint → unit-tests → build
# All must pass before PR can be merged (branch protection rule)
# ──────────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel previous runs on same branch when new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: TypeScript Type Check ──────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript check
        run: npm run backend:type-check

  # ── Job 2: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run backend:lint

      - name: Run Prettier check
        run: npm run format:check

  # ── Job 3: Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage
        run: npm run backend:test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ── Job 4: Build Check ────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run backend:build

      - name: Verify build output
        run: |
          test -f backend/dist/apps/api-server/main.js || (echo "Build failed: api-server missing" && exit 1)
          test -f backend/dist/apps/order-worker/main.js || (echo "Build failed: order-worker missing" && exit 1)
          echo "Build artifacts verified."
